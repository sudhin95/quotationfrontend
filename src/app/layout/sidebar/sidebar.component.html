<aside class="sidebar" [class.collapsed]="isCollapsed">
  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
      </svg>
    </div>
    <span class="brand-text" *ngIf="!isCollapsed">Quotation Builder</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ul>
      <li *ngFor="let item of menuItems">
        <a [routerLink]="item.disabled ? null : item.route" class="nav-link" [class.active]="isActive(item.route)"
          [class.disabled]="item.disabled" [title]="item.label">

          <!-- Dashboard icon -->
          <svg *ngIf="item.icon === 'dashboard'" class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>

          <!-- Clients icon -->
          <svg *ngIf="item.icon === 'clients'" class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>

          <!-- Quotations icon -->
          <svg *ngIf="item.icon === 'quotations'" class="nav-icon" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>

          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>

          <!-- "Coming soon" badge -->
          <span class="coming-soon" *ngIf="item.disabled && !isCollapsed">Soon</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Bottom section — collapse toggle + logout -->
  <div class="sidebar-footer">
    <button class="nav-link footer-btn" (click)="onToggle()" title="Toggle sidebar">
      <svg class="nav-icon toggle-icon" [class.rotated]="isCollapsed" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="11 17 6 12 11 7" />
        <polyline points="18 17 13 12 18 7" />
      </svg>
      <span class="nav-label" *ngIf="!isCollapsed">Collapse</span>
    </button>

    <button class="nav-link footer-btn logout-btn" (click)="logout()" title="Logout">
      <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      <span class="nav-label" *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
