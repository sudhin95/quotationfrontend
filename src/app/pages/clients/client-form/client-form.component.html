<div class="client-form-page animate-fade-in">
  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1>{{ pageTitle }}</h1>
      <p>{{ isEditMode ? 'Update the client details below' : 'Fill in the details to add a new client' }}</p>
    </div>
    <button class="btn btn-secondary" (click)="cancel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Clients
    </button>
  </div>

  <!-- Form Card -->
  <div class="card" *ngIf="!isLoading">
    <div class="card-body">
      <form [formGroup]="clientForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Two-column row -->
        <div class="form-row">
          <!-- Name -->
          <div class="form-group">
            <label for="name">Full Name <span class="required">*</span></label>
            <input
              type="text"
              id="name"
              class="form-control"
              formControlName="name"
              placeholder="e.g. John Smith"
              [class.is-invalid]="f['name'].touched && f['name'].invalid"
            >
            <div class="invalid-feedback" *ngIf="f['name'].touched && f['name'].errors">
              <span *ngIf="f['name'].errors['required']">Name is required</span>
              <span *ngIf="f['name'].errors['minlength']">Name must be at least 2 characters</span>
            </div>
          </div>

          <!-- Company -->
          <div class="form-group">
            <label for="company">Company</label>
            <input
              type="text"
              id="company"
              class="form-control"
              formControlName="company"
              placeholder="e.g. Acme Inc."
            >
          </div>
        </div>

        <!-- Two-column row -->
        <div class="form-row">
          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input
              type="email"
              id="email"
              class="form-control"
              formControlName="email"
              placeholder="e.g. john@acme.com"
              [class.is-invalid]="f['email'].touched && f['email'].invalid"
            >
            <div class="invalid-feedback" *ngIf="f['email'].touched && f['email'].errors">
              <span *ngIf="f['email'].errors['required']">Email is required</span>
              <span *ngIf="f['email'].errors['email']">Please enter a valid email</span>
            </div>
          </div>

          <!-- Phone -->
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              class="form-control"
              formControlName="phone"
              placeholder="e.g. +1 (555) 123-4567"
            >
          </div>
        </div>

        <!-- Notes (full width) -->
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea
            id="notes"
            class="form-control"
            formControlName="notes"
            placeholder="Any additional notes about this client..."
            rows="4"
          ></textarea>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="isSaving">
            <span class="spinner" *ngIf="isSaving"></span>
            <span *ngIf="!isSaving">{{ isEditMode ? 'Update Client' : 'Create Client' }}</span>
            <span *ngIf="isSaving">Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading state -->
  <div class="card" *ngIf="isLoading">
    <div class="card-body loading-state">
      <div class="spinner-large"></div>
      <p>Loading client details...</p>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" [class.toast-success]="toastType === 'success'" [class.toast-error]="toastType === 'error'" *ngIf="showToast">
  {{ toastMessage }}
</div>
