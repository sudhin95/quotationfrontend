<div class="dashboard animate-fade-in">
  <!-- Welcome banner -->
  <div class="welcome-banner">
    <div class="welcome-content">
      <h1>{{ greeting }}, {{ currentUser?.name || 'User' }} 👋</h1>
      <p>Welcome to your Quotation Builder. Here's a quick overview of your workspace.</p>
    </div>
    <div class="welcome-illustration">
      <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.15">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <!-- Total Clients -->
    <div class="stat-card" routerLink="/clients">
      <div class="stat-icon clients-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value">{{ totalClients }}</span>
        <span class="stat-label">Total Clients</span>
      </div>
      <div class="stat-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>

    <!-- Total Quotations (placeholder) -->
    <div class="stat-card disabled">
      <div class="stat-icon quotations-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value">0</span>
        <span class="stat-label">Quotations</span>
      </div>
      <span class="badge badge-primary">Coming Soon</span>
    </div>

    <!-- Approved (placeholder) -->
    <div class="stat-card disabled">
      <div class="stat-icon approved-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value">0</span>
        <span class="stat-label">Approved</span>
      </div>
      <span class="badge badge-primary">Coming Soon</span>
    </div>

    <!-- Revenue (placeholder) -->
    <div class="stat-card disabled">
      <div class="stat-icon revenue-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value">$0</span>
        <span class="stat-label">Total Revenue</span>
      </div>
      <span class="badge badge-primary">Coming Soon</span>
    </div>
  </div>
</div>
